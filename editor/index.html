<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>محرر النماذج ثلاثية الأبعاد - نظام المكتبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #2d2d2d;
            color: #e0e0e0;
        }

        /* واجهة المحرر */
        #container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* شريط الأدوات الجانبي */
        #sidebar {
            width: 280px;
            background: #1e1e1e;
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }

        /* منطقة العرض ثلاثي الأبعاد */
        #canvas-container {
            flex: 1;
            position: relative;
            background: #111;
        }

        /* شريط أدوات علوي */
        #toolbar {
            background: #252525;
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #444;
        }

        .tool-btn {
            background: #3c3c3c;
            border: none;
            color: #ddd;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .tool-btn:hover {
            background: #5a5a5a;
        }
        .tool-btn.active {
            background: #007acc;
            color: white;
        }

        /* قائمة الكائنات (Scene Hierarchy) */
        .hierarchy-panel {
            padding: 12px;
            border-top: 1px solid #444;
            flex: 1;
            overflow-y: auto;
        }
        .hierarchy-item {
            padding: 6px 8px;
            margin: 2px 0;
            background: #2a2a2a;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .hierarchy-item.selected {
            background: #007acc;
        }
        .hierarchy-item .name {
            font-weight: 500;
        }
        .hierarchy-item .controls {
            display: none;
            gap: 8px;
        }
        .hierarchy-item:hover .controls {
            display: flex;
        }

        /* خصائص العنصر */
        .properties-panel {
            padding: 12px;
            background: #262626;
            border-top: 1px solid #444;
        }
        .prop-row {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .prop-row label {
            width: 70px;
            font-size: 12px;
        }
        .prop-row input {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            padding: 4px;
            border-radius: 3px;
        }

        /* أزرار التصدير */
        .export-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        /* رسالة إشعار */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div id="container">
    <div id="sidebar">
        <div style="padding: 12px; font-weight: bold; border-bottom: 1px solid #444;">محرر النماذج ثلاثية الأبعاد</div>
        <div id="toolbar">
            <button class="tool-btn" id="btn-cube">➕ مكعب</button>
            <button class="tool-btn" id="btn-sphere">⚪ كرة</button>
            <button class="tool-btn" id="btn-cylinder">🧷 أسطوانة</button>
            <button class="tool-btn" id="btn-plane">📐 سطح</button>
            <button class="tool-btn" id="btn-duplicate">📑 نسخ</button>
            <button class="tool-btn" id="btn-delete">🗑️ حذف</button>
        </div>
        <div class="hierarchy-panel">
            <div style="margin-bottom: 8px;">🌲 التسلسل الهرمي</div>
            <div id="hierarchy-list"></div>
        </div>
        <div class="properties-panel">
            <div>⚙️ خصائص العنصر المحدد</div>
            <div class="prop-row">
                <label>الاسم:</label>
                <input type="text" id="obj-name" placeholder="اسم">
            </div>
            <div class="prop-row">
                <label>X:</label>
                <input type="number" id="pos-x" step="0.1">
            </div>
            <div class="prop-row">
                <label>Y:</label>
                <input type="number" id="pos-y" step="0.1">
            </div>
            <div class="prop-row">
                <label>Z:</label>
                <input type="number" id="pos-z" step="0.1">
            </div>
            <div class="export-buttons">
                <button class="tool-btn" id="export-json">📤 تصدير JSON</button>
                <button class="tool-btn" id="copy-code">📋 نسخ الكود</button>
                <button class="tool-btn" id="import-model">📂 استيراد</button>
                <input type="file" id="file-import" accept=".json" style="display: none;">
            </div>
        </div>
    </div>
    <div id="canvas-container"></div>
</div>
<div id="toast" class="toast" style="display: none;"></div>

<script type="module">
  console.log("hello")
alert("hello")
import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
import { TransformControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/TransformControls.js';
import ModelingEngine from './engine/Engine.js';
    
    // تهيئة المحرك
    const engine = new ModelingEngine();
    const container = document.getElementById('canvas-container');
    const { scene, camera, renderer } = engine.initScene(container, { backgroundColor: 0x111122 });
    
    // إضافة إضاءة أساسية
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(2, 5, 3);
    scene.add(directionalLight);
    const backLight = new THREE.PointLight(0x4466cc, 0.3);
    backLight.position.set(-2, 1, -3);
    scene.add(backLight);
    
    // OrbitControls للتنقل
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 1.0;
    controls.zoomSpeed = 1.2;
    controls.panSpeed = 0.8;
    
    // TransformControls للتلاعب بالكائنات
    let transformControls = new TransformControls(camera, renderer.domElement);
    transformControls.addEventListener('dragging-changed', function (event) {
        controls.enabled = !event.value;
    });
    scene.add(transformControls);
    
    // متغيرات الحالة
    let selectedObject = null;
    let objectsList = []; // قائمة بجميع الكائنات القابلة للتحديد
    
    // تحديث لوحة الخصائص
    function updatePropertiesPanel(obj) {
        if (!obj) {
            document.getElementById('obj-name').value = '';
            document.getElementById('pos-x').value = '';
            document.getElementById('pos-y').value = '';
            document.getElementById('pos-z').value = '';
            return;
        }
        document.getElementById('obj-name').value = obj.name || 'unnamed';
        document.getElementById('pos-x').value = obj.position.x;
        document.getElementById('pos-y').value = obj.position.y;
        document.getElementById('pos-z').value = obj.position.z;
    }
    
    // ربط خصائص الإدخال
    document.getElementById('obj-name').addEventListener('change', (e) => {
        if (selectedObject) selectedObject.name = e.target.value;
        updateHierarchyUI();
    });
    document.getElementById('pos-x').addEventListener('change', (e) => {
        if (selectedObject) selectedObject.position.x = parseFloat(e.target.value);
    });
    document.getElementById('pos-y').addEventListener('change', (e) => {
        if (selectedObject) selectedObject.position.y = parseFloat(e.target.value);
    });
    document.getElementById('pos-z').addEventListener('change', (e) => {
        if (selectedObject) selectedObject.position.z = parseFloat(e.target.value);
    });
    
    // دالة تحديث واجهة التسلسل الهرمي
    function updateHierarchyUI() {
        const hierarchyDiv = document.getElementById('hierarchy-list');
        hierarchyDiv.innerHTML = '';
        objectsList.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'hierarchy-item' + (selectedObject === obj ? ' selected' : '');
            div.innerHTML = `
                <span class="name">${obj.name || 'Object'}</span>
                <span class="controls">
                    <button class="tool-btn" data-action="select" style="padding:2px 6px;">🔍</button>
                </span>
            `;
            div.querySelector('[data-action="select"]').addEventListener('click', (e) => {
                e.stopPropagation();
                selectObject(obj);
            });
            hierarchyDiv.appendChild(div);
        });
    }
    
    function selectObject(obj) {
        if (selectedObject === obj) return;
        selectedObject = obj;
        transformControls.detach();
        if (obj) {
            transformControls.attach(obj);
        }
        updatePropertiesPanel(obj);
        updateHierarchyUI();
    }
    
    // إضافة مجسم إلى المشهد
    function addMesh(mesh, name = 'Model') {
        mesh.name = name;
        scene.add(mesh);
        objectsList.push(mesh);
        selectObject(mesh);
        updateHierarchyUI();
        return mesh;
    }
    
    // إنشاء مجسمات بدائية باستخدام Three.js مباشرة (للمحرر) وليس عبر المحرك لسهولة التعديل
    function createCube() {
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0x88aaff, roughness: 0.3 });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(0, 0.5, 0);
        return mesh;
    }
    
    function createSphere() {
        const geometry = new THREE.SphereGeometry(0.5, 32, 32);
        const material = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(0, 0.5, 0);
        return mesh;
    }
    
    function createCylinder() {
        const geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
        const material = new THREE.MeshStandardMaterial({ color: 0x88ffaa });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(0, 0.5, 0);
        return mesh;
    }
    
    function createPlane() {
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.MeshStandardMaterial({ color: 0xcccc99, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.set(0, 0, 0);
        return mesh;
    }
    
    // نسخ الكائن المحدد
    function duplicateSelected() {
        if (!selectedObject) return;
        const clone = selectedObject.clone();
        clone.position.x += 1;
        clone.position.y += 0.2;
        clone.name = selectedObject.name + '_copy';
        scene.add(clone);
        objectsList.push(clone);
        selectObject(clone);
        updateHierarchyUI();
        showToast('تم نسخ العنصر');
    }
    
    // حذف الكائن المحدد
    function deleteSelected() {
        if (!selectedObject) return;
        scene.remove(selectedObject);
        const index = objectsList.indexOf(selectedObject);
        if (index !== -1) objectsList.splice(index, 1);
        transformControls.detach();
        selectedObject = null;
        updateHierarchyUI();
        updatePropertiesPanel(null);
        showToast('تم حذف العنصر');
    }
    
    // تصدير المشهد إلى JSON باستخدام المحرك
    function exportSceneToJSON() {
        // ننشئ مجموعة مؤقتة تحتوي على جميع الكائنات
        const tempGroup = new THREE.Group();
        objectsList.forEach(obj => tempGroup.add(obj));
        const assetData = engine.exportToAsset(tempGroup);
        const jsonStr = JSON.stringify(assetData, null, 2);
        return jsonStr;
    }
    
    // نسخ الكود إلى الحافظة
    async function copyCodeToClipboard() {
        const json = exportSceneToJSON();
        try {
            await navigator.clipboard.writeText(json);
            showToast('تم نسخ بيانات النموذج إلى الحافظة');
        } catch (err) {
            showToast('فشل النسخ');
        }
    }
    
    // تنزيل ملف JSON
    function downloadJSON() {
        const json = exportSceneToJSON();
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'model_' + new Date().toISOString().slice(0,19) + '.model.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('تم تنزيل الملف');
    }
    
    // استيراد ملف JSON
    function importJSON(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                const builtGroup = engine.build(data);
                // إضافة كل أطفال المجموعة إلى المشهد
                builtGroup.children.forEach(child => {
                    scene.add(child);
                    objectsList.push(child);
                });
                updateHierarchyUI();
                showToast('تم استيراد النموذج بنجاح');
            } catch (err) {
                showToast('خطأ في قراءة الملف');
            }
        };
        reader.readAsText(file);
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
    
    // ربط الأزرار
    document.getElementById('btn-cube').addEventListener('click', () => addMesh(createCube(), 'Cube'));
    document.getElementById('btn-sphere').addEventListener('click', () => addMesh(createSphere(), 'Sphere'));
    document.getElementById('btn-cylinder').addEventListener('click', () => addMesh(createCylinder(), 'Cylinder'));
    document.getElementById('btn-plane').addEventListener('click', () => addMesh(createPlane(), 'Plane'));
    document.getElementById('btn-duplicate').addEventListener('click', duplicateSelected);
    document.getElementById('btn-delete').addEventListener('click', deleteSelected);
    document.getElementById('export-json').addEventListener('click', downloadJSON);
    document.getElementById('copy-code').addEventListener('click', copyCodeToClipboard);
    document.getElementById('import-model').addEventListener('click', () => {
        document.getElementById('file-import').click();
    });
    document.getElementById('file-import').addEventListener('change', (e) => {
        if (e.target.files.length) importJSON(e.target.files[0]);
        e.target.value = '';
    });
    
    // إضافة مجسم افتراضي بداية
    addMesh(createCube(), 'Sample Cube');
    
    // حلقة العرض
    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // تحديث OrbitControls
        renderer.render(scene, camera);
    }
    animate();
    
    // التكيف مع تغيير حجم النافذة
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        const width = container.clientWidth;
        const height = container.clientHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
    }
    
    console.log('المحرر جاهز، يمكنك إنشاء وتصدير النماذج بتنسيق JSON المتوافق مع المحرك.');
</script>
</body>
</html>
